name: Update Forum Rankings

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = Taiwan time 09:00
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/ docs/data/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update rankings $(date +'%Y-%m-%d')"
            git pull --rebase --autostash origin main
            git push origin main || (git pull --rebase --autostash origin main && git push origin main)
          fi

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: update
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  keepalive:
    runs-on: ubuntu-latest
    permissions:
      actions: write
    steps:
      - name: Keep workflow alive
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow enable update_rankings.yml \
            --repo ${{ github.repository }}

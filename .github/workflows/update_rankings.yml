name: Update Forum Rankings

on:
  schedule:
    - cron: '0 1 * * *'  # UTC 01:00 = Taiwan time 09:00
  workflow_dispatch:       # Allow manual trigger for testing
  push:                   # 暫時加這行
      branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Required: allow bot to push commits

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        run: python main.py

      - name: Commit and push changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md data/
          git diff --staged --quiet || git commit -m "chore: update rankings $(date +'%Y-%m-%d')"
          git push
